<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>費洛蒙共鳴｜ABO Cinematic Engine</title>
    <!-- 引入 Noto Serif 作為源雲明體的備用字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --surface-color: #16161a;
            --text-primary: #e0e0e0;
            --text-secondary: #9e9e9e;
            --accent-color: #8a0303;
            --gold-accent: #c2a370;
            /* 優先使用源雲明體，備用 Noto Serif TC */
            --font-main: 'GenWanMin', '源雲明體', 'Noto Serif TC', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #000;
            color: var(--text-primary);
            font-family: var(--font-main);
            line-height: 2.2; /* 拉開行距，增加呼吸感 */
            letter-spacing: 0.05em;
            display: flex;
            justify-content: center;
            height: 100dvh; /* 使用動態視口高度，解決手機瀏覽器被截斷/太低的問題 */
            overflow: hidden;
        }

        #app {
            width: 100%;
            max-width: 480px;
            height: 100dvh;
            background-color: var(--bg-color);
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            position: absolute;
            top: 0; left: 0;
            background-color: var(--bg-color);
            z-index: 1;
        }
        .screen.active { display: flex; animation: fadeIn 1.2s ease forwards; z-index: 5; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ================= 銀河開場動畫 ================= */
        #intro-screen {
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            align-items: center; justify-content: center; cursor: pointer;
        }
        #galaxy-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; z-index: 0; }
        .star { position: absolute; background-color: #fff; border-radius: 50%; animation: twinkle infinite alternate; }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); box-shadow: 0 0 2px rgba(255,255,255,0.1); }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 8px rgba(255,255,255,0.8); }
        }
        .intro-text { color: var(--gold-accent); font-size: 14px; letter-spacing: 0.4em; z-index: 2; animation: pulseText 2s infinite alternate; }
        @keyframes pulseText { 0% { opacity: 0.4; } 100% { opacity: 1; text-shadow: 0 0 10px var(--gold-accent); } }

        /* ================= 導覽列 ================= */
        .nav-bar {
            width: 100%; padding: 15px 20px; background: rgba(10, 10, 12, 0.95);
            border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 20;
        }
        .back-btn {
            background: none; border: none; color: var(--text-secondary);
            font-family: var(--font-main); font-size: 14px; cursor: pointer; transition: color 0.3s;
        }
        .back-btn:hover { color: var(--gold-accent); }
        .nav-tab-btn {
            background: none; border: 1px solid var(--text-secondary); color: var(--text-secondary);
            padding: 4px 10px; border-radius: 4px; font-family: var(--font-main); font-size: 12px; cursor: pointer; transition: all 0.3s;
        }
        .nav-tab-btn.active { border-color: var(--gold-accent); color: var(--gold-accent); }

        /* ================= 內容區塊與表單 ================= */
        .content-area { flex: 1; overflow-y: auto; padding: 30px 20px; }
        h1 { color: var(--gold-accent); font-weight: 300; font-size: 28px; text-align: center; margin-bottom: 10px; letter-spacing: 0.15em; }
        .subtitle { text-align: center; color: var(--accent-color); font-size: 12px; margin-bottom: 50px; letter-spacing: 0.2em; }
        h2 { color: var(--accent-color); font-size: 18px; margin-bottom: 20px; font-weight: 600; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        .required-mark { color: var(--accent-color); margin-left: 5px; font-size: 12px; }
        label { display: block; color: var(--text-secondary); font-size: 13px; margin-bottom: 5px; }
        input, select, textarea {
            width: 100%; padding: 12px; background: var(--surface-color); border: 1px solid #333;
            color: var(--text-primary); font-family: var(--font-main); outline: none; border-radius: 4px; transition: border-color 0.3s;
            font-size: 15px;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--accent-color); }
        
        .btn {
            width: 100%; padding: 15px; background: var(--accent-color); color: #fff;
            border: none; border-radius: 4px; font-family: var(--font-main); font-size: 16px;
            cursor: pointer; letter-spacing: 0.1em; transition: all 0.3s; margin-top: 10px;
        }
        .btn:hover { background: #a00; }
        .btn-outline { background: transparent; border: 1px solid var(--text-secondary); color: var(--text-secondary); }
        .btn-outline:hover { border-color: var(--gold-accent); color: var(--gold-accent); }

        /* ================= Modal 設定區 ================= */
        .modal-overlay {
            display: none; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.85);
            z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px);
        }
        .modal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
        .modal-content { background: var(--surface-color); width: 100%; max-width: 400px; padding: 30px 20px; border-radius: 8px; border: 1px solid #333; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; background: none; border: none; color: var(--text-secondary); font-size: 24px; cursor: pointer; transition: color 0.3s; }
        .close-btn:hover { color: #fff; }

        /* ================= 遊戲主畫面 (正文) ================= */
        #game-view { display: flex; flex-direction: column; height: 100%; position: relative; }
        #story-container { flex: 1; overflow-y: auto; padding: 20px 20px 200px 20px; scroll-behavior: smooth; }
        
        /* 段落舒適化：空行拉開 */
        .story-paragraph { 
            margin-bottom: 2em; /* 段落間隔為兩個空行高度 */
            opacity: 0; 
            transform: translateY(10px); 
            animation: slideUp 0.8s forwards; 
            text-align: justify; 
            font-size: 16px;
        }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        /* ================= 可折疊選項面板 ================= */
        #action-deck {
            position: absolute; bottom: 0; width: 100%; background: var(--bg-color);
            border-top: 1px solid #333; display: flex; flex-direction: column;
            box-shadow: 0 -15px 30px rgba(0,0,0,0.9); z-index: 50; transition: transform 0.3s ease;
            padding-bottom: env(safe-area-inset-bottom); /* 適配 iPhone 底部橫條 */
        }
        .action-deck-header {
            padding: 18px 10px; text-align: center; color: var(--gold-accent); font-size: 14px;
            cursor: pointer; background: rgba(22, 22, 26, 1); border-bottom: 1px solid #222;
            letter-spacing: 0.1em;
        }
        .action-deck-content {
            padding: 15px 20px; display: flex; flex-direction: column; gap: 10px;
            transition: max-height 0.3s ease, padding 0.3s ease; overflow: hidden;
            max-height: 450px; 
        }
        .action-deck-content.collapsed { max-height: 0; padding-top: 0; padding-bottom: 0; border-top: none; }
        
        .choice-btn {
            background: var(--surface-color); border: 1px solid #444; color: var(--text-primary);
            padding: 14px 12px; text-align: left; border-radius: 4px; cursor: pointer; font-family: var(--font-main); transition: all 0.3s;
            font-size: 15px; line-height: 1.5;
        }
        .choice-btn:hover { border-color: var(--gold-accent); background: #222; }
        #custom-action-container { display: flex; gap: 10px; margin-top: 5px; }
        #custom-action-input { flex: 1; font-size: 15px; }
        #custom-action-btn { width: auto; background: #333; color: var(--gold-accent); }

        /* ================= 狀態欄頁面 ================= */
        #status-view {
            display: none; flex-direction: column; height: 100%; background: var(--bg-color);
            padding: 20px; overflow-y: auto; position: absolute; top: 60px; left: 0; right: 0; bottom: 0; z-index: 15;
        }
        .status-card {
            background: rgba(22, 22, 26, 0.95); border: 1px solid #333; border-left: 3px solid var(--accent-color);
            padding: 20px; font-size: 15px; color: var(--text-secondary); border-radius: 4px; margin-bottom: 20px; line-height: 2.0;
        }
        .status-card h3 { color: var(--text-primary); margin-bottom: 15px; font-weight: 400; letter-spacing: 0.1em; }
        .status-item { margin-bottom: 12px; display: flex; flex-direction: column;}
        .status-item span.label { color: var(--gold-accent); font-size: 12px; margin-bottom: 2px; }
        .status-heart { color: var(--accent-color); font-style: italic; margin-top: 20px; padding-top: 15px; border-top: 1px dashed #333; font-size: 16px;}

        /* ================= 中央半透明演算中視窗 ================= */
        #loading-modal {
            display: none; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.7);
            z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .loading-box {
            background: rgba(22, 22, 26, 0.95);
            border: 1px solid var(--accent-color);
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(138, 3, 3, 0.4);
            text-align: center;
            animation: pulseBg 1.5s infinite alternate;
        }
        .loading-text {
            color: var(--gold-accent);
            font-size: 15px;
            letter-spacing: 0.2em;
            font-family: var(--font-main);
        }
        @keyframes pulseBg {
            0% { box-shadow: 0 0 10px rgba(138, 3, 3, 0.2); }
            100% { box-shadow: 0 0 25px rgba(138, 3, 3, 0.8); }
        }
    </style>
</head>
<body>

<div id="app">

    <!-- 0. 銀河開場畫面 -->
    <div id="intro-screen" class="screen active" onclick="enterLobby()">
        <div id="galaxy-container"></div>
        <div class="intro-text">觸碰以進入實相</div>
    </div>

    <!-- 1. 起始大廳 -->
    <div id="lobby-screen" class="screen">
        <div class="content-area" id="lobby-content">
            <h1>費洛蒙共鳴</h1>
            <div class="subtitle">ABO Cinematic Engine</div>
            <button class="btn" onclick="checkApiAndProceed()">進入實相 (Start Game)</button>
            <button class="btn btn-outline" onclick="openApiModal()">神經網路設定 (API Key)</button>
        </div>
    </div>

    <!-- API 設定視窗 -->
    <div id="api-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeApiModal()">×</button>
            <h2 style="margin-bottom: 20px; text-align: left; border:none;">神經網路設定</h2>
            <div class="form-group">
                <label>選擇 AI 引擎</label>
                <select id="api-type">
                    <option value="gemini">Google Gemini 3.5 Flash / Pro</option>
                    <option value="openai">OpenAI GPT-4o</option>
                </select>
            </div>
            <div class="form-group">
                <label>API Key (必填，僅儲存於設備本地端)</label>
                <input type="password" id="api-key" placeholder="輸入您的密鑰...">
            </div>
            <button class="btn" onclick="saveApiConfig()">儲存設定</button>
        </div>
    </div>

    <!-- 2. 角色建構檔案 (必填防呆版) -->
    <div id="creation-screen" class="screen">
        <div class="nav-bar">
            <button class="back-btn" onclick="switchScreen('lobby-screen')">← 返回大廳</button>
        </div>
        <div class="content-area">
            <h1>角色建構檔案</h1>
            
            <h2>【基本資料】</h2>
            <div class="form-group"><label>姓名<span class="required-mark">(必填)</span></label><input type="text" id="c-name" placeholder="請輸入姓名..."></div>
            <div class="form-group"><label>年齡<span class="required-mark">(必填)</span></label><input type="number" id="c-age" placeholder="請輸入數字..." min="1"></div>
            <div class="form-group">
                <label>第一性別<span class="required-mark">(必填)</span></label>
                <select id="c-gender1">
                    <option value="" disabled selected>請選擇...</option>
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
            </div>
            <div class="form-group">
                <label>第二性別<span class="required-mark">(必填)</span></label>
                <select id="c-gender2" onchange="handleGender2Change()">
                    <option value="" disabled selected>請選擇...</option>
                    <option value="Alpha">Alpha</option>
                    <option value="Beta">Beta</option>
                    <option value="Omega">Omega</option>
                    <option value="Enigma">Enigma</option>
                    <option value="未分化">未分化</option>
                </select>
            </div>

            <h2>【生理特徵】</h2>
            <div class="form-group" id="pheromone-group">
                <label>信息素味道</label>
                <input type="text" id="c-pheromone" placeholder="例如：苦艾酒、白玫瑰、雨後森林...">
            </div>
            <div class="form-group"><label>外貌特徵</label><input type="text" id="c-appearance" placeholder="例如：銀髮紅瞳、身形單薄、偏好黑襯衫..."></div>
            <div class="form-group"><label>整體氣質</label><input type="text" id="c-vibe" placeholder="例如：清冷禁慾、溫柔病弱、狂傲不羈..."></div>

            <h2>【社會與背景】</h2>
            <div class="form-group"><label>公開職業 / 身分<span class="required-mark">(必填)</span></label><input type="text" id="c-job" placeholder="例如：軍方情報官、財閥繼承人..."></div>
            <div class="form-group"><label>性格簡述<span class="required-mark">(必填)</span></label><textarea id="c-personality" rows="2" placeholder="簡述您的性格特徵..."></textarea></div>
            <div class="form-group"><label>特殊背景或隱疾</label><textarea id="c-background" rows="2" placeholder="例如：腺體受損、患有信息素依賴症..."></textarea></div>
            
            <button class="btn" onclick="initializeGame()">生成實相 (Start)</button>
            <div style="height: 50px;"></div>
        </div>
    </div>

    <!-- 3. 遊戲主畫面 -->
    <div id="game-screen" class="screen">
        <div class="nav-bar">
            <button class="back-btn" onclick="exitGame()">← 結束</button>
            <div>
                <button class="nav-tab-btn active" id="tab-story" onclick="toggleGameTab('story')">實相</button>
                <button class="nav-tab-btn" id="tab-status" onclick="toggleGameTab('status')">動態欄</button>
            </div>
        </div>
        
        <!-- 正文視圖 -->
        <div id="game-view">
            <div id="story-container"></div>
            
            <!-- 中央半透明演算彈窗 -->
            <div id="loading-modal">
                <div class="loading-box">
                    <div class="loading-text">實相極致演算中...</div>
                </div>
            </div>
            
            <!-- 可折疊控制面板 -->
            <div id="action-deck" style="display: none;">
                <div class="action-deck-header" onclick="toggleActionDeck()" id="action-deck-toggle">
                    ▼ 收起操作面板
                </div>
                <div class="action-deck-content" id="action-deck-content">
                    <div id="options-container" style="display: flex; flex-direction: column; gap: 10px;"></div>
                    <div id="custom-action-container">
                        <!-- 支援手機語音鍵盤輸入的 input -->
                        <input type="text" id="custom-action-input" placeholder="觸碰以輸入行動或台詞 (支援手機語音輸入)">
                        <button class="btn" id="custom-action-btn" onclick="submitCustomAction()">送出</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 狀態欄視圖 (獨立頁面) -->
        <div id="status-view">
            <div class="status-card" id="status-card-content">
                <h3>當前世界動態</h3>
                <div style="color: var(--text-secondary); font-style: italic; font-size: 13px;">實相推進後將在此更新最新狀態與隱藏數值...</div>
            </div>
        </div>

    </div>

</div>

<script>
/* ================= UI 互動邏輯 ================= */
// 銀河特效
function createGalaxy() {
    const container = document.getElementById('galaxy-container');
    const starCount = 150;
    for (let i = 0; i < starCount; i++) {
        let star = document.createElement('div');
        star.className = 'star';
        let size = Math.random() * 2 + 1;
        star.style.width = size + 'px'; star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
        star.style.animationDuration = (Math.random() * 3 + 1) + 's';
        star.style.animationDelay = (Math.random() * 3) + 's';
        container.appendChild(star);
    }
    setTimeout(() => { if(document.getElementById('intro-screen').classList.contains('active')) enterLobby(); }, 4500);
}

function enterLobby() { switchScreen('lobby-screen'); }
function switchScreen(screenId) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}
function openApiModal() { document.getElementById('api-modal').classList.add('active'); }
function closeApiModal() { document.getElementById('api-modal').classList.remove('active'); }

// 角色卡邏輯：Beta 隱藏信息素
function handleGender2Change() {
    const gender2 = document.getElementById('c-gender2').value;
    const pheromoneGroup = document.getElementById('pheromone-group');
    const pheromoneInput = document.getElementById('c-pheromone');
    if (gender2 === 'Beta') {
        pheromoneGroup.style.display = 'none';
        pheromoneInput.value = ''; 
    } else {
        pheromoneGroup.style.display = 'block';
    }
}

// 遊戲內分頁切換 (實相/狀態欄)
function toggleGameTab(tabName) {
    const btnStory = document.getElementById('tab-story');
    const btnStatus = document.getElementById('tab-status');
    const viewStory = document.getElementById('game-view');
    const viewStatus = document.getElementById('status-view');

    if (tabName === 'story') {
        btnStory.classList.add('active'); btnStatus.classList.remove('active');
        viewStory.style.display = 'flex'; viewStatus.style.display = 'none';
    } else {
        btnStatus.classList.add('active'); btnStory.classList.remove('active');
        viewStatus.style.display = 'flex'; viewStory.style.display = 'none';
    }
}

// 選項折疊邏輯
let isDeckCollapsed = false;
function toggleActionDeck() {
    const content = document.getElementById('action-deck-content');
    const toggle = document.getElementById('action-deck-toggle');
    isDeckCollapsed = !isDeckCollapsed;
    
    if (isDeckCollapsed) {
        content.classList.add('collapsed');
        toggle.innerText = '▲ 展開操作面板';
    } else {
        content.classList.remove('collapsed');
        toggle.innerText = '▼ 收起操作面板';
    }
}

/* ================= 系統提示詞設定 (1500字極限擴寫版) ================= */
const SYSTEM_PROMPT = `
你是《費洛蒙共鳴：ABO Cinematic Engine》的DM，世界觀主宰者與頂級小說家。

【敘事品質絕對要求】
1. 回覆長度限制：每次的劇情推進【絕對不可低於 1500 字】，必須是極其詳細、長篇的小說描寫。將每一個微小的動作、眼神交會、氣味變化進行深度擴寫。
2. 沉浸與感官：必須充滿極致的感官描寫（氣味的拉扯、呼吸的頻率、微表情、體溫）、心理劇烈拉扯與環境烘托。拒絕流水帳，每一句都要有張力。
3. ABO世界觀深度：深刻展現 Alpha的領地侵略性/易感期、Omega的本能臣服/發情熱、或 Beta的清醒抽離。將信息素作為實體的壓迫或誘惑來描寫。
4. 絕對禁止OOC：NPC具備獨立、立體的靈魂與教養，不會無腦倒貼或莫名暴怒。必須根據雙方地位與互動慢慢推進。
5. 所有解析必須靜默運算，絕對不可在文本提及系統、數值變動、好感度等字眼。

【強制輸出格式】(必須嚴格遵守 XML 格式輸出)：
<Cinematic_Novel>
(在這裡撰寫超過 1500 字的極致小說正文，嚴格遵守單一鏡頭換行法則，對話與動作必須交替)
</Cinematic_Novel>

<Player_Choices>
<Option ID="A">具體選項A</Option>
<Option ID="B">具體選項B</Option>
<Option ID="C">具體選項C</Option>
<Option ID="D">具體選項D (反向或克制行為)</Option>
</Player_Choices>

<Status_Bar>
頁碼： P.[數字]
地點： [當前地點]
時間： [yyyy/mm/dd 24hr]
當前姿勢： [具體姿勢描寫]
性慾指數： [0-100%]
關係流轉： [簡述羈絆]
他的心聲： [20字內，展露真實波瀾]
</Status_Bar>
`;

/* ================= API 與核心邏輯 ================= */
let apiConfig = { type: 'gemini', key: '' };
let chatHistory = [];
let characterProfile = "";

function checkApiAndProceed() {
    if (!apiConfig.key || apiConfig.key.trim() === "") {
        alert("【系統限制】請先輸入並儲存有效的 API Key。"); openApiModal(); return;
    }
    switchScreen('creation-screen');
}

function saveApiConfig() {
    const type = document.getElementById('api-type').value;
    const key = document.getElementById('api-key').value.trim();
    if (!key) { alert("API Key 不能為空！"); return; }
    apiConfig = { type, key };
    localStorage.setItem('aboApiConfig', JSON.stringify(apiConfig));
    alert("設定已儲存！"); closeApiModal();
}

function exitGame() {
    if(confirm("確定要結束當前實相並返回大廳嗎？")) {
        document.getElementById('story-container').innerHTML = '';
        document.getElementById('action-deck').style.display = 'none';
        chatHistory = [];
        toggleGameTab('story'); // 復原分頁
        switchScreen('lobby-screen');
    }
}

function initializeGame() {
    const name = document.getElementById('c-name').value.trim();
    const age = document.getElementById('c-age').value.trim();
    const g1 = document.getElementById('c-gender1').value;
    const g2 = document.getElementById('c-gender2').value;
    const pheromone = document.getElementById('c-pheromone').value.trim() || "無";
    const appearance = document.getElementById('c-appearance').value.trim() || "無特別描述";
    const vibe = document.getElementById('c-vibe').value.trim() || "無特別描述";
    const job = document.getElementById('c-job').value.trim();
    const personality = document.getElementById('c-personality').value.trim();
    const bg = document.getElementById('c-background').value.trim() || "無特別背景";

    // 嚴格必填防呆機制
    if(!name || !age || !g1 || !g2 || !job || !personality) {
        alert("請完整填寫所有標註 (必填) 的欄位！");
        return;
    }

    characterProfile = `【玩家角色卡】
姓名：${name} (年齡: ${age})
性別：${g1} / ${g2}
信息素：${pheromone}
外貌：${appearance}
氣質：${vibe}
職業身分：${job}
性格：${personality}
特殊背景：${bg}

請根據此角色卡，創造一個極具張力、充滿感官細節的長篇開局場景，並嚴格輸出 XML。字數絕對不得低於 1500 字。`;

    switchScreen('game-screen');
    sendToAI(characterProfile, true);
}

function submitChoice(choiceText) {
    appendLog(`【你的行動】 ${choiceText}`, 'user');
    // 送出後自動收起選項面板（如果原本是展開的），並切回實相分頁
    toggleGameTab('story');
    if (!isDeckCollapsed) toggleActionDeck();
    sendToAI(`玩家選擇了行動：${choiceText}。請嚴格依照 XML 格式推演下一步，維持極致的感官描寫與 1500 字以上的長度。`, false);
}

function submitCustomAction() {
    const input = document.getElementById('custom-action-input');
    const action = input.value.trim();
    if (!action) return;
    input.value = '';
    submitChoice(action);
}

function appendLog(text, type) {
    const container = document.getElementById('story-container');
    
    if (type === 'user') {
        const div = document.createElement('div');
        div.className = 'story-paragraph';
        div.style.color = 'var(--text-secondary)'; div.style.fontStyle = 'italic';
        div.style.textAlign = 'right'; div.style.borderRight = '3px solid var(--gold-accent)';
        div.style.paddingRight = '10px'; div.innerText = text; 
        container.appendChild(div);
    } else {
        const paragraphs = text.split('\n').filter(p => p.trim() !== '');
        paragraphs.forEach(p => {
            const pDiv = document.createElement('div');
            pDiv.className = 'story-paragraph'; pDiv.innerText = p.trim(); 
            container.appendChild(pDiv);
        });
    }
    container.scrollTop = container.scrollHeight;
}

function renderUIFromXML(xmlString) {
    const novelMatch = xmlString.match(/<Cinematic_Novel>([\s\S]*?)<\/Cinematic_Novel>/i);
    const statusMatch = xmlString.match(/<Status_Bar>([\s\S]*?)<\/Status_Bar>/i);
    
    if (novelMatch) appendLog(novelMatch[1].trim(), 'ai');

    if (statusMatch) {
        const statusBarData = statusMatch[1].trim().split('\n').filter(l => l.trim() !== '');
        let statusHtml = `<h3>當前世界動態</h3>`;
        
        statusBarData.forEach(line => {
            let parts = line.split('：');
            if(parts.length >= 2) {
                let label = parts[0].trim();
                let content = parts.slice(1).join('：').trim();
                
                if (label.includes('他的心聲')) {
                    statusHtml += `<div class="status-heart">「${content}」</div>`;
                } else {
                    statusHtml += `<div class="status-item"><span class="label">${label}</span><span>${content}</span></div>`;
                }
            } else {
                statusHtml += `<div class="status-item"><span>${line}</span></div>`;
            }
        });
        document.getElementById('status-card-content').innerHTML = statusHtml;
    }

    const optionsContainer = document.getElementById('options-container');
    optionsContainer.innerHTML = '';
    const optionRegex = /<Option ID="([A-D])">([\s\S]*?)<\/Option>/gi;
    let match; let hasOptions = false;
    while ((match = optionRegex.exec(xmlString)) !== null) {
        hasOptions = true;
        const btn = document.createElement('button'); btn.className = 'choice-btn';
        btn.innerText = `${match[1]}. ${match[2].trim()}`;
        btn.onclick = () => submitChoice(btn.innerText);
        optionsContainer.appendChild(btn);
    }
    if (!hasOptions) {
        const btn = document.createElement('button'); btn.className = 'choice-btn';
        btn.innerText = `繼續推進...`; btn.onclick = () => submitChoice("繼續觀察並推進");
        optionsContainer.appendChild(btn);
    }
    
    // 生成完畢後，展開選項面板提示玩家
    if (isDeckCollapsed) toggleActionDeck();
    
    document.getElementById('story-container').scrollTop = document.getElementById('story-container').scrollHeight;
}

async function sendToAI(promptText, isInit = false) {
    document.getElementById('action-deck').style.display = 'none';
    
    // 啟動中央半透明遮罩
    document.getElementById('loading-modal').style.display = 'flex';

    try {
        let responseText = "";

        if (apiConfig.type === 'openai') {
            if (isInit) {
                chatHistory = [
                    { role: "system", content: SYSTEM_PROMPT },
                    { role: "user", content: promptText }
                ];
            } else {
                chatHistory.push({ role: "user", content: promptText });
            }
            const res = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiConfig.key}` },
                body: JSON.stringify({ model: 'gpt-4o', messages: chatHistory, temperature: 0.7 })
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error.message);
            responseText = data.choices[0].message.content;
            chatHistory.push({ role: "assistant", content: responseText });

        } else if (apiConfig.type === 'gemini') {
            if (isInit) { chatHistory = [{ role: "user", parts: [{ text: characterProfile }] }]; } 
            else { chatHistory.push({ role: "user", parts: [{ text: promptText }] }); }

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiConfig.key}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
                    contents: chatHistory,
                    generationConfig: { temperature: 0.7 }
                })
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error.message);
            responseText = data.candidates[0].content.parts[0].text;
            chatHistory.push({ role: "model", parts: [{ text: responseText }] });
        }

        responseText = responseText.replace(/```xml\n?/g, '').replace(/```\n?/g, '').trim();
        
        // 關閉中央半透明遮罩並顯示面板
        document.getElementById('loading-modal').style.display = 'none';
        document.getElementById('action-deck').style.display = 'flex';
        
        renderUIFromXML(responseText);

    } catch (error) {
        document.getElementById('loading-modal').style.display = 'none';
        document.getElementById('action-deck').style.display = 'flex';
        alert("API 呼叫失敗，請檢查 API Key 是否正確或有額度。\n錯誤訊息：" + error.message);
    }
}

window.onload = () => {
    createGalaxy();
    const saved = localStorage.getItem('aboApiConfig');
    if (saved) {
        apiConfig = JSON.parse(saved);
        if (apiConfig.type === 'gemini') document.getElementById('api-type').value = 'gemini';
        else document.getElementById('api-type').value = apiConfig.type;
        document.getElementById('api-key').value = apiConfig.key;
    }
};
