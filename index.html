<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>費洛蒙共鳴｜ABO Cinematic Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --surface-color: #16161a;
            --text-primary: #e0e0e0;
            --text-secondary: #9e9e9e;
            --accent-color: #8a0303;
            --gold-accent: #c2a370;
            --font-main: 'Noto Serif TC', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #000; /* 外圍底色設為黑 */
            color: var(--text-primary);
            font-family: var(--font-main);
            line-height: 1.8;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #app {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background-color: var(--bg-color);
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            position: absolute;
            top: 0; left: 0;
            background-color: var(--bg-color);
            z-index: 1;
        }
        .screen.active { display: flex; animation: fadeIn 1.2s ease forwards; z-index: 5; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* ================= 銀河開場動畫 ================= */
        #intro-screen {
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        #galaxy-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            z-index: 0;
        }
        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            animation: twinkle infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); box-shadow: 0 0 2px rgba(255,255,255,0.1); }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 8px rgba(255,255,255,0.8); }
        }
        .intro-text {
            color: var(--gold-accent);
            font-size: 14px;
            letter-spacing: 0.4em;
            z-index: 2;
            animation: pulseText 2s infinite alternate;
        }
        @keyframes pulseText {
            0% { opacity: 0.4; }
            100% { opacity: 1; text-shadow: 0 0 10px var(--gold-accent); }
        }

        /* 導覽列 */
        .nav-bar {
            width: 100%;
            padding: 15px 20px;
            background: rgba(10, 10, 12, 0.9);
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .back-btn {
            background: none; border: none; color: var(--text-secondary);
            font-family: var(--font-main); font-size: 16px; cursor: pointer;
            transition: color 0.3s; display: flex; align-items: center; gap: 5px;
        }
        .back-btn:hover { color: var(--gold-accent); }

        /* 內容區塊 */
        .content-area {
            flex: 1; overflow-y: auto; padding: 30px 20px;
        }

        h1 { color: var(--gold-accent); font-weight: 300; font-size: 28px; text-align: center; margin-bottom: 10px; letter-spacing: 0.15em; }
        .subtitle { text-align: center; color: var(--accent-color); font-size: 12px; margin-bottom: 50px; letter-spacing: 0.2em; }
        h2 { color: var(--accent-color); font-size: 20px; margin-bottom: 20px; font-weight: 600; text-align: center; }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: var(--text-secondary); font-size: 14px; margin-bottom: 5px; }
        input, select, textarea {
            width: 100%; padding: 12px; background: var(--surface-color); border: 1px solid #333;
            color: var(--text-primary); font-family: var(--font-main); outline: none; border-radius: 4px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--accent-color); }
        
        .btn {
            width: 100%; padding: 15px; background: var(--accent-color); color: #fff;
            border: none; border-radius: 4px; font-family: var(--font-main); font-size: 16px;
            cursor: pointer; letter-spacing: 0.1em; transition: all 0.3s; margin-top: 10px;
        }
        .btn:hover { background: #a00; }
        .btn-outline { background: transparent; border: 1px solid var(--text-secondary); color: var(--text-secondary); }
        .btn-outline:hover { border-color: var(--gold-accent); color: var(--gold-accent); }

        /* 彈出視窗 (Modal) */
        .modal-overlay {
            display: none; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.85);
            z-index: 100; align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
        .modal-content {
            background: var(--surface-color); width: 100%; max-width: 400px;
            padding: 30px 20px; border-radius: 8px; border: 1px solid #333; position: relative;
        }
        .close-btn {
            position: absolute; top: 15px; right: 20px; background: none; border: none;
            color: var(--text-secondary); font-size: 24px; cursor: pointer; transition: color 0.3s;
        }
        .close-btn:hover { color: #fff; }

        #lobby-content { display: flex; flex-direction: column; justify-content: center; height: 100%; }

        #game-screen { padding: 0; }
        #story-container { flex: 1; overflow-y: auto; padding: 20px 20px 180px 20px; scroll-behavior: smooth; }
        
        .story-paragraph { margin-bottom: 25px; opacity: 0; transform: translateY(10px); animation: slideUp 0.8s forwards; }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        #status-bar {
            background: rgba(22, 22, 26, 0.95); border-left: 3px solid var(--accent-color);
            padding: 15px 20px; font-size: 13px; color: var(--text-secondary); margin-top: 20px;
        }
        .status-item { margin-bottom: 5px; }
        .status-heart { color: var(--gold-accent); font-style: italic; margin-top: 10px; }

        #action-deck {
            position: absolute; bottom: 0; width: 100%; background: var(--bg-color);
            border-top: 1px solid #333; padding: 15px 20px; display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.8); z-index: 10;
        }
        .choice-btn {
            background: var(--surface-color); border: 1px solid #444; color: var(--text-primary);
            padding: 12px; text-align: left; border-radius: 4px; cursor: pointer; font-family: var(--font-main);
            transition: all 0.3s;
        }
        .choice-btn:hover { border-color: var(--gold-accent); background: #222; }
        
        #custom-action-container { display: flex; gap: 10px; margin-top: 5px; }
        #custom-action-input { flex: 1; }
        #custom-action-btn { width: auto; background: #333; color: var(--gold-accent); }

        #loading-indicator { text-align: center; color: var(--accent-color); display: none; font-style: italic; padding: 20px; }
    </style>
</head>
<body>

<div id="app">

    <!-- ================= 0. 銀河開場畫面 (Intro) ================= -->
    <div id="intro-screen" class="screen active" onclick="enterLobby()">
        <div id="galaxy-container"></div>
        <div class="intro-text">觸碰以進入實相</div>
    </div>

    <!-- ================= 1. 起始大廳 (Lobby) ================= -->
    <div id="lobby-screen" class="screen">
        <div class="content-area" id="lobby-content">
            <h1>費洛蒙共鳴</h1>
            <div class="subtitle">ABO Cinematic Engine</div>
            
            <button class="btn" onclick="checkApiAndProceed()">進入實相 (Start Game)</button>
            <button class="btn btn-outline" onclick="openApiModal()">神經網路設定 (API Key)</button>
        </div>
    </div>

    <!-- ================= API 彈出視窗 (Modal) ================= -->
    <div id="api-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeApiModal()">×</button>
            <h2 style="margin-bottom: 30px;">神經網路連結設定</h2>
            
            <div class="form-group">
                <label>選擇 AI 引擎</label>
                <select id="api-type">
                    <!-- 修正為正確的 3.5 版本 -->
                    <option value="gemini">Google Gemini 3.5 Flash (推薦)</option>
                    <option value="openai">OpenAI GPT-4o</option>
                </select>
            </div>
            <div class="form-group">
                <label>API Key (必填，僅儲存於設備本地端)</label>
                <input type="password" id="api-key" placeholder="輸入您的密鑰...">
            </div>
            <button class="btn" onclick="saveApiConfig()">儲存設定</button>
        </div>
    </div>

    <!-- ================= 2. 角色建構檔案 (Creation Screen) ================= -->
    <div id="creation-screen" class="screen">
        <div class="nav-bar">
            <button class="back-btn" onclick="switchScreen('lobby-screen')">← 返回大廳</button>
        </div>
        <div class="content-area">
            <h2>角色建構檔案</h2>
            <div class="form-group"><label>姓名</label><input type="text" id="c-name" value="林青"></div>
            <div class="form-group"><label>性別設定</label>
                <div style="display: flex; gap: 10px;">
                    <select id="c-gender1"><option value="男">男</option><option value="女">女</option></select>
                    <select id="c-gender2"><option value="Omega">Omega</option><option value="Alpha">Alpha</option><option value="Beta">Beta</option><option value="Enigma">Enigma</option></select>
                </div>
            </div>
            <div class="form-group"><label>信息素味道 (Beta可留白)</label><input type="text" id="c-pheromone" placeholder="例如：白玫瑰與冷雨"></div>
            <div class="form-group"><label>外貌與氣質</label><input type="text" id="c-appearance" placeholder="例如：清冷禁慾，身形單薄"></div>
            <div class="form-group"><label>公開職業與背景設定</label><textarea id="c-background" rows="3" placeholder="例如：軍方情報官，患有信息素依賴症..."></textarea></div>
            <button class="btn" onclick="initializeGame()">生成實相 (Start)</button>
        </div>
    </div>

    <!-- ================= 3. 遊戲主畫面 (Game Screen) ================= -->
    <div id="game-screen" class="screen">
        <div class="nav-bar">
            <button class="back-btn" onclick="exitGame()">← 結束實相並返回大廳</button>
        </div>
        
        <div id="story-container"></div>
        <div id="loading-indicator">實相演算中...</div>
        
        <div id="action-deck" style="display: none;">
            <div id="options-container"></div>
            <div id="custom-action-container">
                <input type="text" id="custom-action-input" placeholder="自由輸入行動或台詞...">
                <button class="btn" id="custom-action-btn" onclick="submitCustomAction()">送出</button>
            </div>
        </div>
    </div>

</div>

<script>
/* ================= 銀河開場特效生成 ================= */
function createGalaxy() {
    const container = document.getElementById('galaxy-container');
    const starCount = 150; // 星星數量
    for (let i = 0; i < starCount; i++) {
        let star = document.createElement('div');
        star.className = 'star';
        // 隨機大小與位置
        let size = Math.random() * 2 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        // 隨機閃爍動畫時間
        star.style.animationDuration = (Math.random() * 3 + 1) + 's';
        star.style.animationDelay = (Math.random() * 3) + 's';
        container.appendChild(star);
    }
    
    // 設定 4.5 秒後自動進入大廳
    setTimeout(() => {
        if(document.getElementById('intro-screen').classList.contains('active')) {
            enterLobby();
        }
    }, 4500);
}

function enterLobby() {
    switchScreen('lobby-screen');
}

/* ================= 系統提示詞設定 ================= */
const SYSTEM_PROMPT = `
你是《費洛蒙共鳴：ABO Cinematic Engine》的DM。
【核心守則】
1. 這是高沉浸長篇文字遊戲，文風需對標現代精緻韓劇與小說。絕對禁止OOC。
2. 遵守ABO世界觀（Alpha壓迫/Omega發情/信息素/標記等），NPC具備獨立人格。
3. 嚴格執行「單一鏡頭換行法則」，動作、對白、情緒轉折必須換行。
4. 每段回覆必須在 600-1000 字左右，嚴禁短回覆。
5. 所有解析必須靜默運算，絕對不可提及系統、好感度+1等字眼。

【強制輸出格式】(必須嚴格遵守 XML 格式輸出)：
<Cinematic_Novel>
(在這裡撰寫小說正文)
</Cinematic_Novel>

<Player_Choices>
<Option ID="A">具體選項A</Option>
<Option ID="B">具體選項B</Option>
<Option ID="C">具體選項C</Option>
<Option ID="D">具體選項D (反向或克制行為)</Option>
</Player_Choices>

<Status_Bar>
頁碼： P.[數字]
地點： [當前地點]
時間： [yyyy/mm/dd 24hr]
當前姿勢： [具體姿勢描寫]
性慾指數： [0-100%]
關係流轉： [簡述羈絆]
他的心聲： [20字內，展露真實波瀾]
</Status_Bar>
`;

/* ================= 全域變數 ================= */
let apiConfig = { type: 'gemini', key: '' };
let chatHistory = [];
let characterProfile = "";

/* ================= 畫面與 Modal 控制 ================= */
function switchScreen(screenId) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}

function openApiModal() {
    document.getElementById('api-modal').classList.add('active');
}

function closeApiModal() {
    document.getElementById('api-modal').classList.remove('active');
}

/* ================= API 邏輯與限制 ================= */
function checkApiAndProceed() {
    if (!apiConfig.key || apiConfig.key.trim() === "") {
        alert("【系統限制】請先輸入並儲存有效的 API Key 才能進入實相。");
        openApiModal();
        return;
    }
    switchScreen('creation-screen');
}

function saveApiConfig() {
    const type = document.getElementById('api-type').value;
    const key = document.getElementById('api-key').value.trim();
    
    if (!key) {
        alert("API Key 不能為空！請輸入金鑰。");
        return;
    }
    
    apiConfig = { type, key };
    localStorage.setItem('aboApiConfig', JSON.stringify(apiConfig));
    alert("設定已儲存！");
    closeApiModal();
}

function exitGame() {
    if(confirm("確定要結束當前實相並返回大廳嗎？未儲存的進度將會遺失。")) {
        document.getElementById('story-container').innerHTML = '';
        document.getElementById('action-deck').style.display = 'none';
        chatHistory = [];
        switchScreen('lobby-screen');
    }
}

/* ================= 遊戲運行核心邏輯 ================= */
function initializeGame() {
    const name = document.getElementById('c-name').value;
    const g1 = document.getElementById('c-gender1').value;
    const g2 = document.getElementById('c-gender2').value;
    const pheromone = document.getElementById('c-pheromone').value;
    const appearance = document.getElementById('c-appearance').value;
    const bg = document.getElementById('c-background').value;

    characterProfile = `【玩家角色卡】\n姓名：${name}\n性別：${g1} / ${g2}\n信息素：${pheromone}\n外貌：${appearance}\n背景：${bg}\n\n請根據此角色卡，創造一個高張力的開局場景，並輸出 XML。`;

    switchScreen('game-screen');
    sendToAI(characterProfile, true);
}

function submitChoice(choiceText) {
    appendLog(`【你的行動】 ${choiceText}`, 'user');
    sendToAI(`玩家選擇了行動：${choiceText}。請嚴格依照 XML 格式推演下一步。`, false);
}

function submitCustomAction() {
    const input = document.getElementById('custom-action-input');
    const action = input.value.trim();
    if (!action) return;
    input.value = '';
    submitChoice(action);
}

/* ================= UI 渲染邏輯 ================= */
function appendLog(text, type) {
    const container = document.getElementById('story-container');
    const div = document.createElement('div');
    div.className = 'story-paragraph';
    
    if (type === 'user') {
        div.style.color = 'var(--text-secondary)';
        div.style.fontStyle = 'italic';
        div.style.textAlign = 'right';
        div.innerText = text;
        container.appendChild(div);
    } else {
        const paragraphs = text.split('\n').filter(p => p.trim() !== '');
        paragraphs.forEach(p => {
            const pDiv = document.createElement('div');
            pDiv.className = 'story-paragraph';
            pDiv.innerText = p.trim();
            container.appendChild(pDiv);
        });
    }
    container.scrollTop = container.scrollHeight;
}

function renderUIFromXML(xmlString) {
    const novelMatch = xmlString.match(/<Cinematic_Novel>([\s\S]*?)<\/Cinematic_Novel>/i);
    const statusMatch = xmlString.match(/<Status_Bar>([\s\S]*?)<\/Status_Bar>/i);
    
    if (novelMatch) appendLog(novelMatch[1].trim(), 'ai');

    if (statusMatch) {
        const statusBarData = statusMatch[1].trim().split('\n').filter(l => l.trim() !== '');
        const statusDiv = document.createElement('div');
        statusDiv.id = 'status-bar';
        
        statusBarData.forEach(line => {
            if (line.includes('他的心聲')) {
                statusDiv.innerHTML += `<div class="status-heart">${line}</div>`;
            } else {
                statusDiv.innerHTML += `<div class="status-item">${line}</div>`;
            }
        });
        document.getElementById('story-container').appendChild(statusDiv);
    }

    const optionsContainer = document.getElementById('options-container');
    optionsContainer.innerHTML = '';
    const optionRegex = /<Option ID="([A-D])">([\s\S]*?)<\/Option>/gi;
    let match;
    let hasOptions = false;
    while ((match = optionRegex.exec(xmlString)) !== null) {
        hasOptions = true;
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerText = `${match[1]}. ${match[2].trim()}`;
        btn.onclick = () => submitChoice(btn.innerText);
        optionsContainer.appendChild(btn);
    }
    
    if (!hasOptions) {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerText = `繼續推進...`;
        btn.onclick = () => submitChoice("繼續觀察並推進");
        optionsContainer.appendChild(btn);
    }
    
    document.getElementById('story-container').scrollTop = document.getElementById('story-container').scrollHeight;
}

/* ================= 核心 AI API 呼叫 ================= */
async function sendToAI(promptText, isInit = false) {
    document.getElementById('action-deck').style.display = 'none';
    document.getElementById('loading-indicator').style.display = 'block';

    try {
        let responseText = "";

        if (apiConfig.type === 'openai') {
            if (isInit) {
                chatHistory = [
                    { role: "system", content: SYSTEM_PROMPT },
                    { role: "user", content: promptText }
                ];
            } else {
                chatHistory.push({ role: "user", content: promptText });
            }

            const res = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiConfig.key}`
                },
                body: JSON.stringify({
                    model: 'gpt-4o',
                    messages: chatHistory,
                    temperature: 0.7
                })
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error.message);
            responseText = data.choices[0].message.content;
            chatHistory.push({ role: "assistant", content: responseText });

        } else if (apiConfig.type === 'gemini') {
            if (isInit) {
                chatHistory = [
                    { role: "user", parts: [{ text: characterProfile }] }
                ];
            } else {
                chatHistory.push({ role: "user", parts: [{ text: promptText }] });
            }

            // 【重點修正】：使用存在且支援 systemInstruction 的模型 gemini-3.5-flash
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiConfig.key}`;
            
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
                    contents: chatHistory,
                    generationConfig: { temperature: 0.7 }
                })
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error.message);
            responseText = data.candidates[0].content.parts[0].text;
            chatHistory.push({ role: "model", parts: [{ text: responseText }] });
        }

        responseText = responseText.replace(/```xml\n?/g, '').replace(/```\n?/g, '').trim();
        
        document.getElementById('loading-indicator').style.display = 'none';
        document.getElementById('action-deck').style.display = 'flex';
        renderUIFromXML(responseText);

    } catch (error) {
        document.getElementById('loading-indicator').style.display = 'none';
        document.getElementById('action-deck').style.display = 'flex';
        alert("API 呼叫失敗，請檢查 API Key 是否正確或有額度。\n錯誤訊息：" + error.message);
    }
}

// 初始化載入
window.onload = () => {
    // 啟動銀河特效
    createGalaxy();

    // 讀取本地儲存設定
    const saved = localStorage.getItem('aboApiConfig');
    if (saved) {
        apiConfig = JSON.parse(saved);
        // 如果舊設定存到了錯誤的名字，強制轉換回 gemini
        if (apiConfig.type === 'gemini') {
            document.getElementById('api-type').value = 'gemini';
        } else {
            document.getElementById('api-type').value = apiConfig.type;
        }
        document.getElementById('api-key').value = apiConfig.key;
    }
};
</script>
</body>
</html>
