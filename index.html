<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>費洛蒙共鳴｜ABO Cinematic Engine (PC版)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --surface-color: #16161a;
            --text-primary: #e0e0e0;
            --text-secondary: #9e9e9e;
            --accent-color: #8a0303;
            --gold-accent: #c2a370;
            --font-main: 'GenWanMin', '源雲明體', 'Noto Serif TC', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #000;
            color: var(--text-primary);
            font-family: var(--font-main);
            line-height: 2.2; 
            letter-spacing: 0.05em;
            display: flex;
            justify-content: center;
            height: 100vh; 
            overflow: hidden;
            background-image: radial-gradient(rgba(138, 3, 3, 0.08) 1px, transparent 1px);
            background-size: 30px 30px; /* 電腦版放大背景網格 */
        }

        /* 電腦版主容器擴寬至 1200px */
        #app {
            width: 100%; max-width: 1200px; height: 100vh;
            background-color: var(--bg-color); position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,1); display: flex;
            flex-direction: column; overflow: hidden;
            border-left: 1px solid #1a1a1a; border-right: 1px solid #1a1a1a;
        }

        .screen {
            display: none; width: 100%; height: 100%;
            flex-direction: column; position: absolute;
            top: 0; left: 0; background-color: var(--bg-color); z-index: 1;
        }
        .screen.active { display: flex; animation: fadeIn 1.2s ease forwards; z-index: 5; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ================= 銀河開場動畫 ================= */
        #intro-screen {
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            align-items: center; justify-content: center; cursor: pointer;
        }
        #galaxy-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; z-index: 0; }
        .star { position: absolute; background-color: #fff; border-radius: 50%; animation: twinkle infinite alternate; }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); box-shadow: 0 0 2px rgba(255,255,255,0.1); }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 8px rgba(255,255,255,0.8); }
        }
        .intro-text { color: var(--gold-accent); font-size: 18px; letter-spacing: 0.5em; z-index: 2; animation: pulseText 2s infinite alternate; }
        @keyframes pulseText { 0% { opacity: 0.4; } 100% { opacity: 1; text-shadow: 0 0 15px var(--gold-accent); } }

        /* ================= 裝飾花紋框 ================= */
        .ornate-box {
            position: relative; border: 1px solid rgba(194, 163, 112, 0.3);
            background: rgba(10, 10, 12, 0.8); backdrop-filter: blur(5px);
            padding: 50px 40px; border-radius: 4px; box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
            max-width: 600px; width: 100%; margin: 0 auto;
        }
        .ornate-box::before, .ornate-box::after {
            content: ''; position: absolute; width: 40px; height: 40px; border-color: var(--gold-accent); border-style: solid;
        }
        .ornate-box::before { top: -2px; left: -2px; border-width: 2px 0 0 2px; }
        .ornate-box::after { bottom: -2px; right: -2px; border-width: 0 2px 2px 0; }

        /* ================= 導覽列 (PC版加大 Padding) ================= */
        .nav-bar {
            width: 100%; padding: 20px 40px; background: rgba(10, 10, 12, 0.95);
            border-bottom: 1px solid rgba(194, 163, 112, 0.2); display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 20;
        }
        .back-btn, .action-text-btn {
            background: none; border: none; color: var(--text-secondary);
            font-family: var(--font-main); font-size: 16px; cursor: pointer; transition: color 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .back-btn:hover, .action-text-btn:hover { color: var(--gold-accent); }
        
        .nav-tab-btn {
            background: none; border: 1px solid var(--text-secondary); color: var(--text-secondary);
            padding: 6px 15px; border-radius: 4px; font-family: var(--font-main); font-size: 14px; cursor: pointer; transition: all 0.3s;
            margin: 0 5px;
        }
        .nav-tab-btn.active { border-color: var(--gold-accent); color: var(--gold-accent); }

        /* ================= 內容區塊 (置中寬度) ================= */
        .content-area { flex: 1; overflow-y: auto; padding: 40px 15%; }
        h1 { color: var(--gold-accent); font-weight: 300; font-size: 36px; text-align: center; margin-bottom: 10px; letter-spacing: 0.15em; }
        .subtitle { text-align: center; color: var(--accent-color); font-size: 14px; margin-bottom: 50px; letter-spacing: 0.2em; }
        h2 { color: var(--accent-color); font-size: 22px; margin-bottom: 25px; font-weight: 600; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 40px;}
        
        .form-group { margin-bottom: 25px; text-align: left; }
        .required-mark { color: var(--accent-color); margin-left: 8px; font-size: 13px; }
        label { display: block; color: var(--text-secondary); font-size: 15px; margin-bottom: 8px; }
        input, select, textarea {
            width: 100%; padding: 15px; background: var(--surface-color); border: 1px solid #333;
            color: var(--text-primary); font-family: var(--font-main); outline: none; border-radius: 4px; transition: border-color 0.3s; font-size: 16px;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--accent-color); }
        
        .btn {
            width: 100%; padding: 18px; background: var(--accent-color); color: #fff;
            border: none; border-radius: 4px; font-family: var(--font-main); font-size: 18px;
            cursor: pointer; letter-spacing: 0.1em; transition: all 0.3s; margin-top: 15px;
        }
        .btn:hover { background: #a00; box-shadow: 0 0 20px rgba(138,3,3,0.6); }
        .btn-outline { background: transparent; border: 1px solid var(--text-secondary); color: var(--text-secondary); }
        .btn-outline:hover { border-color: var(--gold-accent); color: var(--gold-accent); }

        /* ================= 彈窗設定 (Modal) ================= */
        .modal-overlay {
            display: none; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.85);
            z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px);
        }
        .modal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
        .modal-content { width: 100%; max-width: 600px; }
        .close-btn { position: absolute; top: 20px; right: 25px; background: none; border: none; color: var(--text-secondary); font-size: 28px; cursor: pointer; transition: color 0.3s; z-index: 10; }
        .close-btn:hover { color: #fff; }

        /* ================= 存檔清單樣式 ================= */
        .save-item {
            background: rgba(22, 22, 26, 0.8); border: 1px solid #333; padding: 20px;
            border-radius: 4px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
        }
        .save-item-info strong { color: var(--gold-accent); font-size: 18px; letter-spacing: 1px; }
        .save-item-info small { color: var(--text-secondary); font-size: 14px; display: block; margin-top: 5px; }

        /* ================= 遊戲主畫面 (正文) ================= */
        #game-view { display: flex; flex-direction: column; height: 100%; position: relative; }
        #story-container { flex: 1; overflow-y: auto; padding: 40px 15% 250px 15%; scroll-behavior: smooth; }
        .story-paragraph { 
            margin-bottom: 2em; opacity: 0; transform: translateY(10px); animation: slideUp 0.8s forwards; 
            text-align: justify; font-size: 18px; /* 電腦版字體放大 */
        }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        /* ================= 可折疊選項面板 ================= */
        #action-deck {
            position: absolute; bottom: 0; width: 100%; background: var(--bg-color);
            border-top: 1px solid rgba(194, 163, 112, 0.3); display: flex; flex-direction: column;
            box-shadow: 0 -15px 40px rgba(0,0,0,0.9); z-index: 50; transition: transform 0.3s ease;
        }
        .action-deck-header {
            padding: 15px 10px; text-align: center; color: var(--gold-accent); font-size: 14px;
            cursor: pointer; background: rgba(10, 10, 12, 0.95); border-bottom: 1px solid #222; letter-spacing: 0.1em;
        }
        .action-deck-content {
            padding: 25px 15%; display: flex; flex-direction: column; gap: 15px; /* PC版內縮排版 */
            transition: max-height 0.3s ease, padding 0.3s ease; overflow: hidden; max-height: 500px; 
        }
        .action-deck-content.collapsed { max-height: 0; padding-top: 0; padding-bottom: 0; border-top: none; }
        .choice-btn {
            background: var(--surface-color); border: 1px solid #444; color: var(--text-primary);
            padding: 16px 20px; text-align: left; border-radius: 4px; cursor: pointer; font-family: var(--font-main); transition: all 0.3s; font-size: 16px; line-height: 1.6;
        }
        .choice-btn:hover { border-color: var(--gold-accent); background: #222; padding-left: 25px; } /* PC版懸浮特效 */
        #custom-action-container { display: flex; gap: 15px; margin-top: 10px; }
        #custom-action-input { flex: 1; font-size: 16px; padding: 15px; }
        #custom-action-btn { width: 120px; background: #333; color: var(--gold-accent); }

        /* ================= 狀態欄頁面 ================= */
        #status-view {
            display: none; flex-direction: column; height: 100%; background: var(--bg-color);
            padding: 40px 15% 100px 15%; overflow-y: auto; position: absolute; top: 70px; left: 0; right: 0; bottom: 0; z-index: 15;
        }
        .status-card {
            background: rgba(22, 22, 26, 0.95); border: 1px solid #333; border-left: 4px solid var(--accent-color);
            padding: 30px; font-size: 16px; color: var(--text-secondary); border-radius: 4px; margin-bottom: 25px; line-height: 2.0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); animation: fadeIn 0.5s ease;
        }
        .status-card h3 { color: var(--text-primary); margin-bottom: 20px; font-weight: 400; letter-spacing: 0.1em; border-bottom: 1px solid #333; padding-bottom: 15px;}
        .status-item { margin-bottom: 12px; display: flex; flex-direction: column;}
        .status-item span.label { color: var(--gold-accent); font-size: 13px; margin-bottom: 2px; }
        .status-heart { color: var(--accent-color); font-style: italic; margin-top: 20px; padding-top: 20px; border-top: 1px dashed #333; font-size: 18px;}

        /* ================= 演算中彈窗 ================= */
        #loading-modal {
            display: none; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.7);
            z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .loading-box {
            background: rgba(22, 22, 26, 0.95); border: 1px solid var(--accent-color);
            padding: 40px 60px; border-radius: 8px; box-shadow: 0 0 30px rgba(138, 3, 3, 0.4);
            text-align: center; animation: pulseBg 1.5s infinite alternate;
        }
        .loading-text { color: var(--gold-accent); font-size: 18px; letter-spacing: 0.2em; font-family: var(--font-main); }
        @keyframes pulseBg { 0% { box-shadow: 0 0 15px rgba(138, 3, 3, 0.2); } 100% { box-shadow: 0 0 35px rgba(138, 3, 3, 0.8); } }
    </style>
</head>
<body>

<!-- 大廳環境音 (預設為Google官方暗黑科幻環境音，點擊後觸發) -->
<audio id="lobby-bgm" loop preload="auto">
    <source src="https://actions.google.com/sounds/v1/science_fiction/dark_ambient_drone.ogg" type="audio/ogg">
</audio>

<div id="app">

    <!-- 0. 銀河開場 -->
    <div id="intro-screen" class="screen active" onclick="enterLobby()">
        <div id="galaxy-container"></div>
        <div class="intro-text">觸碰以進入實相</div>
    </div>

    <!-- 1. 起始大廳 -->
    <div id="lobby-screen" class="screen">
        <div class="content-area" style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
            <div class="ornate-box">
                <h1>費洛蒙共鳴</h1>
                <div class="subtitle">ABO Cinematic Engine</div>
                <button class="btn" onclick="checkApiAndProceed('new')">創立實相 (New Game)</button>
                <button class="btn btn-outline" onclick="openLoadModal()">讀取實相 (Load Game)</button>
                <button class="btn btn-outline" style="border-color: #333;" onclick="openApiModal()">神經網路設定</button>
            </div>
        </div>
    </div>

    <!-- API 設定視窗 -->
    <div id="api-modal" class="modal-overlay">
        <div class="modal-content ornate-box">
            <button class="close-btn" onclick="closeApiModal()">×</button>
            <h2 style="border:none;">神經網路設定</h2>
            <div class="form-group">
                <label>選擇 AI 引擎</label>
                <select id="api-type">
                    <!-- 修正為官方正式型號，確保不會404報錯 -->
                    <option value="gemini">Google Gemini 1.5 Flash / Pro</option>
                    <option value="openai">OpenAI GPT-4o</option>
                </select>
            </div>
            <div class="form-group">
                <label>API Key (必填，僅儲存於本地端)</label>
                <input type="password" id="api-key" placeholder="輸入密鑰...">
            </div>
            <button class="btn" onclick="saveApiConfig()">儲存設定</button>
        </div>
    </div>

    <!-- 讀取存檔視窗 -->
    <div id="load-modal" class="modal-overlay">
        <div class="modal-content ornate-box" style="max-height: 80vh; display:flex; flex-direction:column;">
            <button class="close-btn" onclick="closeLoadModal()">×</button>
            <h2 style="border:none;">實相記憶庫 (Saves)</h2>
            <div id="save-list" style="overflow-y:auto; flex:1; margin-top: 10px;">
                <!-- 存檔清單生成區 -->
            </div>
        </div>
    </div>

    <!-- 2. 角色建構檔案 -->
    <div id="creation-screen" class="screen">
        <div class="nav-bar">
            <button class="back-btn" onclick="switchScreen('lobby-screen')">← 返回大廳</button>
        </div>
        <div class="content-area">
            <div style="max-width: 800px; margin: 0 auto;">
                <h1>角色建構檔案</h1>
                
                <h2>【世界背景】</h2>
                <div class="form-group">
                    <label>時代背景<span class="required-mark">(必填)</span></label>
                    <select id="c-era">
                        <option value="" disabled selected>請選擇...</option>
                        <option value="古代">古代</option>
                        <option value="現代">現代</option>
                        <option value="未來科技">未來科技</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>世界設定<span class="required-mark">(必填)</span></label>
                    <select id="c-setting">
                        <option value="" disabled selected>請選擇...</option>
                        <option value="東方">東方</option>
                        <option value="西方">西方</option>
                        <option value="架空世界">架空世界</option>
                    </select>
                </div>

                <h2>【基本資料】</h2>
                <div class="form-group"><label>姓名<span class="required-mark">(必填)</span></label><input type="text" id="c-name" placeholder="請輸入姓名..."></div>
                <div class="form-group"><label>年齡<span class="required-mark">(必填)</span></label><input type="number" id="c-age" placeholder="請輸入數字..." min="1"></div>
                <div class="form-group">
                    <label>第一性別<span class="required-mark">(必填)</span></label>
                    <select id="c-gender1">
                        <option value="" disabled selected>請選擇...</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>第二性別<span class="required-mark">(必填)</span></label>
                    <select id="c-gender2" onchange="handleGender2Change()">
                        <option value="" disabled selected>請選擇...</option>
                        <option value="Alpha">Alpha</option>
                        <option value="Beta">Beta</option>
                        <option value="Omega">Omega</option>
                        <option value="Enigma">Enigma</option>
                        <option value="未分化">未分化</option>
                    </select>
                </div>

                <h2>【生理特徵】</h2>
                <div class="form-group" id="pheromone-group">
                    <!-- 電腦版動態新增必填標籤 -->
                    <label>信息素味道<span id="pheromone-req-mark" class="required-mark" style="display:none;">(必填)</span></label>
                    <input type="text" id="c-pheromone" placeholder="例如：苦艾酒、白玫瑰、雨後森林...">
                </div>
                <div class="form-group"><label>外貌特徵</label><input type="text" id="c-appearance" placeholder="例如：銀髮紅瞳、身形單薄、偏好黑襯衫..."></div>
                <div class="form-group"><label>整體氣質</label><input type="text" id="c-vibe" placeholder="例如：清冷禁慾、溫柔病弱、狂傲不羈..."></div>

                <h2>【社會與背景】</h2>
                <div class="form-group"><label>公開職業 / 身分<span class="required-mark">(必填)</span></label><input type="text" id="c-job" placeholder="例如：軍方情報官、財閥繼承人..."></div>
                <div class="form-group"><label>性格簡述<span class="required-mark">(必填)</span></label><textarea id="c-personality" rows="3" placeholder="簡述您的性格特徵..."></textarea></div>
                <div class="form-group"><label>特殊背景或隱疾</label><textarea id="c-background" rows="3" placeholder="例如：腺體受損、患有信息素依賴症..."></textarea></div>
                
                <button class="btn" onclick="initializeGame()">生成實相 (Start)</button>
                <div style="height: 80px;"></div>
            </div>
        </div>
    </div>

    <!-- 3. 遊戲主畫面 -->
    <div id="game-screen" class="screen">
        <div class="nav-bar">
            <button class="action-text-btn" onclick="saveGameProgress()">💾 儲存實相</button>
            <div>
                <button class="nav-tab-btn active" id="tab-story" onclick="toggleGameTab('story')">實相閱讀區</button>
                <button class="nav-tab-btn" id="tab-status" onclick="toggleGameTab('status')">動態履歷</button>
            </div>
            <button class="back-btn" onclick="exitGame()">離開 ➔</button>
        </div>
        
        <!-- 正文 -->
        <div id="game-view">
            <div id="story-container"></div>
            <!-- 演算中 -->
            <div id="loading-modal">
                <div class="loading-box"><div class="loading-text">實相極致演算中...</div></div>
            </div>
            <!-- 面板 -->
            <div id="action-deck" style="display: none;">
                <div class="action-deck-header" onclick="toggleActionDeck()" id="action-deck-toggle">▼ 收起操作面板</div>
                <div class="action-deck-content" id="action-deck-content">
                    <div id="options-container" style="display: flex; flex-direction: column; gap: 10px;"></div>
                    <div id="custom-action-container">
                        <input type="text" id="custom-action-input" placeholder="點擊以輸入行動或專屬台詞...">
                        <button class="btn" id="custom-action-btn" onclick="submitCustomAction()">送出</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 狀態欄 (無限累積) -->
        <div id="status-view">
            <div style="max-width: 800px; margin: 0 auto; width: 100%;" id="status-card-wrapper">
                <!-- 歷史動態卡片將會附加於此 -->
            </div>
        </div>
    </div>
</div>

<script>
/* ================= UI 與特效邏輯 ================= */
function createGalaxy() {
    const container = document.getElementById('galaxy-container');
    for (let i = 0; i < 200; i++) {
        let star = document.createElement('div');
        star.className = 'star';
        let size = Math.random() * 2 + 1;
        star.style.width = size + 'px'; star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
        star.style.animationDuration = (Math.random() * 3 + 1) + 's';
        star.style.animationDelay = (Math.random() * 3) + 's';
        container.appendChild(star);
    }
}

// 點擊銀河畫面後觸發大廳與音樂
function enterLobby() { 
    switchScreen('lobby-screen'); 
    
    // 播放環境音樂
    const bgm = document.getElementById('lobby-bgm');
    bgm.volume = 0.6;
    bgm.play().catch(e => console.log("瀏覽器自動播放限制，需等待互動:", e));
}

function switchScreen(screenId) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}
function openApiModal() { document.getElementById('api-modal').classList.add('active'); }
function closeApiModal() { document.getElementById('api-modal').classList.remove('active'); }
function openLoadModal() { 
    renderSaveList(); 
    document.getElementById('load-modal').classList.add('active'); 
}
function closeLoadModal() { document.getElementById('load-modal').classList.remove('active'); }

// 角色卡邏輯：動態防呆與信息素隱藏
function handleGender2Change() {
    const gender2 = document.getElementById('c-gender2').value;
    const pheromoneGroup = document.getElementById('pheromone-group');
    const pheromoneInput = document.getElementById('c-pheromone');
    const reqMark = document.getElementById('pheromone-req-mark');
    
    if (gender2 === 'Beta' || gender2 === '未分化') {
        pheromoneGroup.style.display = 'none';
        pheromoneInput.value = ''; 
        reqMark.style.display = 'none';
    } else {
        pheromoneGroup.style.display = 'block';
        reqMark.style.display = 'inline'; // 顯示必填標籤
    }
}

// 分頁切換 (實相/狀態)
function toggleGameTab(tabName) {
    const btnStory = document.getElementById('tab-story'), btnStatus = document.getElementById('tab-status');
    const viewStory = document.getElementById('game-view'), viewStatus = document.getElementById('status-view');
    if (tabName === 'story') {
        btnStory.classList.add('active'); btnStatus.classList.remove('active');
        viewStory.style.display = 'flex'; viewStatus.style.display = 'none';
    } else {
        btnStatus.classList.add('active'); btnStory.classList.remove('active');
        viewStatus.style.display = 'flex'; viewStory.style.display = 'none';
    }
}

// 面板折疊
let isDeckCollapsed = false;
function toggleActionDeck() {
    const content = document.getElementById('action-deck-content'), toggle = document.getElementById('action-deck-toggle');
    isDeckCollapsed = !isDeckCollapsed;
    if (isDeckCollapsed) { content.classList.add('collapsed'); toggle.innerText = '▲ 展開操作面板'; } 
    else { content.classList.remove('collapsed'); toggle.innerText = '▼ 收起操作面板'; }
}

/* ================= 核心 AI 與存檔變數 ================= */
let apiConfig = { type: 'gemini', key: '' };
let chatHistory = [];
let characterProfile = "";
let currentSaveName = "";

/* ================= 系統提示詞設定 ================= */
const SYSTEM_PROMPT = `
你是《費洛蒙共鳴：ABO Cinematic Engine》的DM，世界觀主宰者與頂級小說家。

【敘事品質絕對要求】
1. 回覆長度限制：每次劇情推進【絕對不可低於 1500 字】，極其詳細地擴寫每一個動作、眼神交會、心理拉扯。
2. 沉浸與感官：必須充滿極致的感官描寫（氣味、呼吸、體溫）。
3. 角色與多樣性：每一次登場的NPC人名請盡量不要重複，保持世界觀的多樣性與廣度。NPC不准無腦倒貼。
4. 隱藏演算：「信息素匹配度」為DM開局暗自設定的隱藏數值，僅從劇情氛圍流露，絕對不可直接寫在狀態欄中。
5. 禁止OOC及所有系統文字。

【強制輸出格式】(嚴格遵守 XML，不要加入其他對話)：
<Cinematic_Novel>
(在這裡撰寫超過 1500 字的極致小說正文，嚴格遵守單一鏡頭換行法則)
</Cinematic_Novel>

<Player_Choices>
<Option ID="A">具體選項A</Option>
<Option ID="B">具體選項B</Option>
<Option ID="C">具體選項C</Option>
<Option ID="D">具體選項D (反向或克制行為)</Option>
</Player_Choices>

<Status_Bar>
頁碼： P.[數字]
地點： [當前地點]
時間： [yyyy/mm/dd 24hr]
當前姿勢： [具體姿勢描寫]
性慾指數： [0-100%]
信任值： [0-100%，影響是否卸下防備]
佔慾值： [0-100%，針對Alpha/Enigma]
依賴值： [0-100%，針對Omega]
關係流轉： [簡述羈絆]
他的心聲： [20字內，展露真實波瀾]
</Status_Bar>
`;

/* ================= 存檔系統 (Save/Load) ================= */
function saveGameProgress() {
    if(chatHistory.length === 0) return alert("目前沒有可儲存的進度。");
    const saves = JSON.parse(localStorage.getItem('aboSaves') || '[]');
    const defaultName = currentSaveName || new Date().toLocaleString();
    const saveName = prompt("請為此實相記憶命名：", defaultName);
    if(!saveName) return;
    
    currentSaveName = saveName;
    const newSave = {
        id: Date.now(),
        name: saveName,
        chatHistory: chatHistory,
        profile: characterProfile,
        timestamp: new Date().toLocaleString()
    };
    
    saves.push(newSave);
    localStorage.setItem('aboSaves', JSON.stringify(saves));
    alert("實相記憶已成功儲存！");
}

function renderSaveList() {
    const saves = JSON.parse(localStorage.getItem('aboSaves') || '[]');
    const list = document.getElementById('save-list');
    list.innerHTML = '';
    if(saves.length === 0) {
        list.innerHTML = '<p style="color:var(--text-secondary); text-align:center; margin-top:20px;">目前沒有任何存檔。</p>';
    } else {
        saves.reverse().forEach(s => {
            const div = document.createElement('div');
            div.className = 'save-item';
            div.innerHTML = `
                <div class="save-item-info"><strong>${s.name}</strong><small>${s.timestamp}</small></div>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-outline" style="width:auto; padding:8px 15px; margin:0;" onclick="loadGame(${s.id})">讀取</button>
                    <button class="btn btn-outline" style="width:auto; padding:8px 15px; margin:0; border-color:#8a0303; color:#8a0303" onclick="deleteSave(${s.id}, event)">刪除</button>
                </div>
            `;
            list.appendChild(div);
        });
    }
}

function deleteSave(id, event) {
    event.stopPropagation();
    if(!confirm("確定要刪除這筆實相記憶嗎？")) return;
    let saves = JSON.parse(localStorage.getItem('aboSaves') || '[]');
    saves = saves.filter(s => s.id !== id);
    localStorage.setItem('aboSaves', JSON.stringify(saves));
    renderSaveList();
}

function loadGame(id) {
    if (!apiConfig.key) return alert("請先在神經網路設定中輸入 API Key 才能讀取實相。");
    
    const saves = JSON.parse(localStorage.getItem('aboSaves') || '[]');
    const save = saves.find(s => s.id === id);
    if(!save) return alert("存檔已遺失或損毀。");
    
    chatHistory = save.chatHistory;
    characterProfile = save.profile;
    currentSaveName = save.name;
    
    closeLoadModal();
    switchScreen('game-screen');
    
    document.getElementById('story-container').innerHTML = '';
    document.getElementById('status-card-wrapper').innerHTML = ''; 
    
    chatHistory.forEach((msg, index) => {
        if(msg.role === 'user') {
            let text = msg.content || (msg.parts && msg.parts[0].text);
            if(text && text.includes('玩家選擇了行動：')) {
                const actionText = text.replace('玩家選擇了行動：', '').split('。')[0];
                appendLog(`【你的行動】 ${actionText}`, 'user');
            }
        } else {
            let text = msg.content || (msg.parts && msg.parts[0].text);
            const isLast = (index === chatHistory.length - 1);
            renderUIFromXML(text, isLast);
        }
    });
    document.getElementById('action-deck').style.display = 'flex';
}

/* ================= 遊戲核心控制 ================= */
function checkApiAndProceed(action) {
    if (!apiConfig.key || apiConfig.key.trim() === "") {
        alert("【系統限制】請先輸入並儲存有效的 API Key。"); openApiModal(); return;
    }
    if(action === 'new') switchScreen('creation-screen');
}

function exitGame() {
    if(confirm("確定要離開當前實相嗎？未儲存的進度將會遺失。")) {
        document.getElementById('story-container').innerHTML = '';
        document.getElementById('status-card-wrapper').innerHTML = '';
        document.getElementById('action-deck').style.display = 'none';
        chatHistory = []; currentSaveName = "";
        toggleGameTab('story'); 
        switchScreen('lobby-screen');
    }
}

function initializeGame() {
    const era = document.getElementById('c-era').value;
    const setting = document.getElementById('c-setting').value;
    const name = document.getElementById('c-name').value.trim();
    const age = document.getElementById('c-age').value.trim();
    const g1 = document.getElementById('c-gender1').value;
    const g2 = document.getElementById('c-gender2').value;
    const pheromone = document.getElementById('c-pheromone').value.trim();
    const appearance = document.getElementById('c-appearance').value.trim() || "無特別描述";
    const vibe = document.getElementById('c-vibe').value.trim() || "無特別描述";
    const job = document.getElementById('c-job').value.trim();
    const personality = document.getElementById('c-personality').value.trim();
    const bg = document.getElementById('c-background').value.trim() || "無特別背景";

    // 基本必填檢查
    if(!era || !setting || !name || !age || !g1 || !g2 || !job || !personality) {
        alert("請完整填寫所有標註 (必填) 的欄位！"); return;
    }
    // 信息素必填檢查 (如果不是 Beta 且 不是 未分化)
    if(g2 !== 'Beta' && g2 !== '未分化') {
        if(!pheromone) {
            alert("非 Beta / 未分化者，【信息素味道】為必填！"); return;
        }
    }

    characterProfile = `【玩家角色卡】
時代背景：${era} | 世界設定：${setting}
姓名：${name} (年齡: ${age})
性別：${g1} / ${g2}
信息素：${pheromone || "無"}
外貌：${appearance}
氣質：${vibe}
職業身分：${job}
性格：${personality}
特殊背景：${bg}

請根據此角色卡，創造一個極具張力、充滿感官細節的長篇開局場景，並嚴格輸出 XML。字數絕對不得低於 1500 字。`;

    currentSaveName = "";
    document.getElementById('story-container').innerHTML = '';
    document.getElementById('status-card-wrapper').innerHTML = '';
    switchScreen('game-screen');
    sendToAI(characterProfile, true);
}

function submitChoice(choiceText) {
    appendLog(`【你的行動】 ${choiceText}`, 'user');
    toggleGameTab('story');
    if (!isDeckCollapsed) toggleActionDeck();
    sendToAI(`玩家選擇了行動：${choiceText}。請嚴格依照 XML 格式推演下一步，維持極致感官描寫與 1500 字以上的長度。`, false);
}

function submitCustomAction() {
    const input = document.getElementById('custom-action-input');
    const action = input.value.trim();
    if (!action) return;
    input.value = '';
    submitChoice(action);
}

/* ================= 渲染邏輯 ================= */
function appendLog(text, type) {
    const container = document.getElementById('story-container');
    if (type === 'user') {
        const div = document.createElement('div');
        div.className = 'story-paragraph';
        div.style.color = 'var(--text-secondary)'; div.style.fontStyle = 'italic';
        div.style.textAlign = 'right'; div.style.borderRight = '4px solid var(--gold-accent)';
        div.style.paddingRight = '15px'; div.innerText = text; 
        container.appendChild(div);
    } else {
        const paragraphs = text.split('\n').filter(p => p.trim() !== '');
        paragraphs.forEach(p => {
            const pDiv = document.createElement('div');
            pDiv.className = 'story-paragraph'; pDiv.innerText = p.trim(); 
            container.appendChild(pDiv);
        });
    }
    // 平滑滾動
    setTimeout(() => { container.scrollTop = container.scrollHeight; }, 150);
}

function renderUIFromXML(xmlString, renderOptions = true) {
    const novelMatch = xmlString.match(/<Cinematic_Novel>([\s\S]*?)<\/Cinematic_Novel>/i);
    const statusMatch = xmlString.match(/<Status_Bar>([\s\S]*?)<\/Status_Bar>/i);
    
    if (novelMatch) appendLog(novelMatch[1].trim(), 'ai');

    if (statusMatch) {
        const statusBarData = statusMatch[1].trim().split('\n').filter(l => l.trim() !== '');
        let statusHtml = `<h3>實相動態更新</h3>`;
        
        statusBarData.forEach(line => {
            let parts = line.split('：');
            if(parts.length >= 2) {
                let label = parts[0].trim();
                let content = parts.slice(1).join('：').trim();
                if (label.includes('他的心聲')) {
                    statusHtml += `<div class="status-heart">「${content}」</div>`;
                } else {
                    statusHtml += `<div class="status-item"><span class="label">${label}</span><span>${content}</span></div>`;
                }
            } else {
                statusHtml += `<div class="status-item"><span>${line}</span></div>`;
            }
        });
        
        const newCard = document.createElement('div');
        newCard.className = 'status-card';
        newCard.innerHTML = statusHtml;
        document.getElementById('status-card-wrapper').prepend(newCard);
    }

    if(renderOptions) {
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        const optionRegex = /<Option ID="([A-D])">([\s\S]*?)<\/Option>/gi;
        let match; let hasOptions = false;
        while ((match = optionRegex.exec(xmlString)) !== null) {
            hasOptions = true;
            const btn = document.createElement('button'); btn.className = 'choice-btn';
            btn.innerText = `${match[1]}. ${match[2].trim()}`;
            btn.onclick = () => submitChoice(btn.innerText);
            optionsContainer.appendChild(btn);
        }
        if (!hasOptions) {
            const btn = document.createElement('button'); btn.className = 'choice-btn';
            btn.innerText = `繼續推進...`; btn.onclick = () => submitChoice("繼續觀察並推進");
            optionsContainer.appendChild(btn);
        }
        if (isDeckCollapsed) toggleActionDeck();
    }
}

async function sendToAI(promptText, isInit = false) {
    document.getElementById('action-deck').style.display = 'none';
    document.getElementById('loading-modal').style.display = 'flex';

    try {
        let responseText = "";
        if (apiConfig.type === 'openai') {
            if (isInit) {
                chatHistory = [{ role: "system", content: SYSTEM_PROMPT }, { role: "user", content: promptText }];
            } else {
                chatHistory.push({ role: "user", content: promptText });
            }
            const res = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiConfig.key}` },
                body: JSON.stringify({ model: 'gpt-4o', messages: chatHistory, temperature: 0.7 })
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error.message);
            responseText = data.choices[0].message.content;
            chatHistory.push({ role: "assistant", content: responseText });

        } else if (apiConfig.type === 'gemini') {
            if (isInit) { chatHistory = [{ role: "user", parts: [{ text: characterProfile }] }]; } 
            else { chatHistory.push({ role: "user", parts: [{ text: promptText }] }); }

            // 嚴格修正為官方穩定的 gemini-1.5-flash 模型，避免 404 報錯
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiConfig.key}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
                    contents: chatHistory,
                    generationConfig: { temperature: 0.7 }
                })
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error.message);
            responseText = data.candidates[0].content.parts[0].text;
            chatHistory.push({ role: "model", parts: [{ text: responseText }] });
        }

        responseText = responseText.replace(/```xml\n?/g, '').replace(/```\n?/g, '').trim();
        document.getElementById('loading-modal').style.display = 'none';
        document.getElementById('action-deck').style.display = 'flex';
        renderUIFromXML(responseText, true);

    } catch (error) {
        document.getElementById('loading-modal').style.display = 'none';
        document.getElementById('action-deck').style.display = 'flex';
        alert("API 呼叫失敗，請檢查 API Key 狀態。\n錯誤：" + error.message);
    }
}

window.onload = () => {
    createGalaxy();
    const saved = localStorage.getItem('aboApiConfig');
    if (saved) {
        apiConfig = JSON.parse(saved);
        if (apiConfig.type === 'gemini') document.getElementById('api-type').value = 'gemini';
        else document.getElementById('api-type').value = apiConfig.type;
        document.getElementById('api-key').value = apiConfig.key;
    }
};
